version: '3.8'

services:
  # ─── Database ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: neyya-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: travel_companion
      POSTGRES_USER: neyya_admin
      POSTGRES_PASSWORD: neyya_local_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U neyya_admin -d travel_companion']
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: neyya-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── API Server ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: neyya-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://neyya_admin:neyya_local_pass@postgres:5432/travel_companion
      REDIS_URL: redis://redis:6379
      JWT_SECRET: local-dev-jwt-secret-change-in-production
      APP_URL: http://localhost:3001
      API_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3001,http://localhost:3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Web Frontend ────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000
    container_name: neyya-web
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    depends_on:
      - api

  # ─── Admin Panel ─────────────────────────────────────────────────────────────
  admin:
    build:
      context: .
      dockerfile: packages/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000
    container_name: neyya-admin
    restart: unless-stopped
    ports:
      - '3002:3002'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
