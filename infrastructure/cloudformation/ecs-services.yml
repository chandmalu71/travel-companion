AWSTemplateFormatVersion: '2010-09-09'
Description: 'Neyya.ai - ECS Cluster, ALB, Services, and IAM Roles'

Parameters:
  Environment:
    Type: String
    AllowedValues: [qa, staging, production]
    Default: qa
  ProjectName:
    Type: String
    Default: neyya
  VPCId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID from network stack
  PublicSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet 1 for ALB
  PublicSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet 2 for ALB
  PrivateSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: Private subnet 1 for ECS tasks
  PrivateSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Private subnet 2 for ECS tasks
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group for ALB
  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group for ECS tasks
  CertificateArn:
    Type: String
    Description: ACM certificate ARN for HTTPS (leave empty to skip HTTPS listener)
    Default: ''
  ApiImageUri:
    Type: String
    Description: ECR image URI for API service
  WebImageUri:
    Type: String
    Description: ECR image URI for Web service
  AdminImageUri:
    Type: String
    Description: ECR image URI for Admin service
  ApiDomainName:
    Type: String
    Default: api-qa.neyya.ai
  WebDomainName:
    Type: String
    Default: qa.neyya.ai
  AdminDomainName:
    Type: String
    Default: admin-qa.neyya.ai

Resources:
  # ─── ECS Cluster ───────────────────────────────────────────────────────
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${ProjectName}-${Environment}'
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ─── CloudWatch Log Groups ────────────────────────────────────────────
  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${ProjectName}-api-${Environment}'
      RetentionInDays: 30

  WebLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${ProjectName}-web-${Environment}'
      RetentionInDays: 14

  AdminLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${ProjectName}-admin-${Environment}'
      RetentionInDays: 14

  # ─── IAM Roles ────────────────────────────────────────────────────────
  ECSExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-ecs-execution-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/*'

  ApiTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-api-task-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ApiPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub 'arn:aws:s3:::${ProjectName}-uploads-${Environment}/*'
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: '*'
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: '*'
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                Resource: !Sub 'arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:${ProjectName}-*'
              - Effect: Allow
                Action:
                  - cognito-idp:AdminGetUser
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminSetUserPassword
                Resource: !Sub 'arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*'

  WebTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-web-task-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  AdminTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-admin-task-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  # ─── Application Load Balancer ─────────────────────────────────────────
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-alb'
      Type: application
      Scheme: internet-facing
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ─── HTTP Listener (switch to HTTPS once ACM cert is validated) ────────
  ALBListenerHTTP:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: '404'
            ContentType: text/plain
            MessageBody: Not Found

  # ─── Target Groups ────────────────────────────────────────────────────
  ApiTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectName}-api-${Environment}'
      Port: 3000
      Protocol: HTTP
      VpcId: !Ref VPCId
      TargetType: ip
      HealthCheckPath: /api/health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  WebTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectName}-web-${Environment}'
      Port: 3001
      Protocol: HTTP
      VpcId: !Ref VPCId
      TargetType: ip
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  AdminTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectName}-admin-${Environment}'
      Port: 3002
      Protocol: HTTP
      VpcId: !Ref VPCId
      TargetType: ip
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  # ─── Listener Rules (host-based routing) ───────────────────────────────
  ApiListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListenerHTTP
      Priority: 1
      Conditions:
        - Field: host-header
          Values:
            - !Ref ApiDomainName
      Actions:
        - Type: forward
          TargetGroupArn: !Ref ApiTargetGroup

  WebListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListenerHTTP
      Priority: 2
      Conditions:
        - Field: host-header
          Values:
            - !Ref WebDomainName
      Actions:
        - Type: forward
          TargetGroupArn: !Ref WebTargetGroup

  AdminListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListenerHTTP
      Priority: 3
      Conditions:
        - Field: host-header
          Values:
            - !Ref AdminDomainName
      Actions:
        - Type: forward
          TargetGroupArn: !Ref AdminTargetGroup

  # ─── ECS Task Definitions ──────────────────────────────────────────────
  ApiTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${ProjectName}-api-${Environment}'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
      TaskRoleArn: !GetAtt ApiTaskRole.Arn
      ContainerDefinitions:
        - Name: api
          Image: !Ref ApiImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: '3000'
            - Name: HOST
              Value: '0.0.0.0'
            - Name: SES_REGION
              Value: eu-west-1
            - Name: S3_REGION
              Value: eu-west-1
            - Name: BEDROCK_REGION
              Value: eu-west-1
            - Name: APP_URL
              Value: !Sub 'https://${WebDomainName}'
            - Name: API_URL
              Value: !Sub 'https://${ApiDomainName}'
            - Name: CORS_ORIGINS
              Value: !Sub 'https://${WebDomainName},https://${AdminDomainName}'
          Secrets:
            - Name: DATABASE_URL
              ValueFrom: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${Environment}/DATABASE_URL'
            - Name: REDIS_URL
              ValueFrom: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${Environment}/REDIS_URL'
            - Name: JWT_SECRET
              ValueFrom: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${Environment}/JWT_SECRET'
            - Name: GOOGLE_CLIENT_ID
              ValueFrom: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${Environment}/GOOGLE_CLIENT_ID'
            - Name: GOOGLE_CLIENT_SECRET
              ValueFrom: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${Environment}/GOOGLE_CLIENT_SECRET'
            - Name: MICROSOFT_CLIENT_ID
              ValueFrom: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${Environment}/MICROSOFT_CLIENT_ID'
            - Name: MICROSOFT_CLIENT_SECRET
              ValueFrom: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${Environment}/MICROSOFT_CLIENT_SECRET'
            - Name: FACEBOOK_APP_ID
              ValueFrom: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${Environment}/FACEBOOK_APP_ID'
            - Name: FACEBOOK_APP_SECRET
              ValueFrom: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${Environment}/FACEBOOK_APP_SECRET'
            - Name: STRIPE_SECRET_KEY
              ValueFrom: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${Environment}/STRIPE_SECRET_KEY'
            - Name: STRIPE_PUBLISHABLE_KEY
              ValueFrom: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${Environment}/STRIPE_PUBLISHABLE_KEY'
            - Name: STRIPE_WEBHOOK_SECRET
              ValueFrom: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${Environment}/STRIPE_WEBHOOK_SECRET'
            - Name: PII_ENCRYPTION_KEY
              ValueFrom: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${Environment}/PII_ENCRYPTION_KEY'
            - Name: OPENWEATHERMAP_API_KEY
              ValueFrom: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${Environment}/OPENWEATHERMAP_API_KEY'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ApiLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: api

  WebTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${ProjectName}-web-${Environment}'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
      TaskRoleArn: !GetAtt WebTaskRole.Arn
      ContainerDefinitions:
        - Name: web
          Image: !Ref WebImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 3001
              Protocol: tcp
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: '3001'
            - Name: HOSTNAME
              Value: '0.0.0.0'
            - Name: NEXT_PUBLIC_API_URL
              Value: !Sub 'https://${ApiDomainName}'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref WebLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: web

  AdminTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${ProjectName}-admin-${Environment}'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
      TaskRoleArn: !GetAtt AdminTaskRole.Arn
      ContainerDefinitions:
        - Name: admin
          Image: !Ref AdminImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 3002
              Protocol: tcp
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: '3002'
            - Name: HOSTNAME
              Value: '0.0.0.0'
            - Name: NEXT_PUBLIC_API_URL
              Value: !Sub 'https://${ApiDomainName}'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref AdminLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: admin

  # ─── ECS Services ──────────────────────────────────────────────────────
  ApiService:
    Type: AWS::ECS::Service
    DependsOn: ApiListenerRule
    Properties:
      ServiceName: !Sub '${ProjectName}-api-${Environment}'
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref ApiTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref PublicSubnet1
            - !Ref PublicSubnet2
          SecurityGroups:
            - !Ref ECSSecurityGroup
      LoadBalancers:
        - TargetGroupArn: !Ref ApiTargetGroup
          ContainerName: api
          ContainerPort: 3000
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      HealthCheckGracePeriodSeconds: 60

  WebService:
    Type: AWS::ECS::Service
    DependsOn: WebListenerRule
    Properties:
      ServiceName: !Sub '${ProjectName}-web-${Environment}'
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref WebTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref PublicSubnet1
            - !Ref PublicSubnet2
          SecurityGroups:
            - !Ref ECSSecurityGroup
      LoadBalancers:
        - TargetGroupArn: !Ref WebTargetGroup
          ContainerName: web
          ContainerPort: 3001
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200

  AdminService:
    Type: AWS::ECS::Service
    DependsOn: AdminListenerRule
    Properties:
      ServiceName: !Sub '${ProjectName}-admin-${Environment}'
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref AdminTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref PublicSubnet1
            - !Ref PublicSubnet2
          SecurityGroups:
            - !Ref ECSSecurityGroup
      LoadBalancers:
        - TargetGroupArn: !Ref AdminTargetGroup
          ContainerName: admin
          ContainerPort: 3002
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200

Outputs:
  ClusterName:
    Value: !Ref ECSCluster
    Export:
      Name: !Sub '${ProjectName}-${Environment}-ClusterName'
  ALBDnsName:
    Value: !GetAtt ALB.DNSName
    Export:
      Name: !Sub '${ProjectName}-${Environment}-ALBDnsName'
  ALBHostedZoneId:
    Value: !GetAtt ALB.CanonicalHostedZoneID
    Export:
      Name: !Sub '${ProjectName}-${Environment}-ALBHostedZoneId'
  ApiServiceName:
    Value: !GetAtt ApiService.Name
  WebServiceName:
    Value: !GetAtt WebService.Name
  AdminServiceName:
    Value: !GetAtt AdminService.Name
