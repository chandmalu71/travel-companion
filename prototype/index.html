<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-frame">
    <!-- Header -->
    <header class="app-header">
      <h1 id="header-title">Travel Companion</h1>
      <div class="header-actions">
        <button class="header-btn" onclick="showModal('search-modal')" title="AI Search">🔍</button>
        <button class="header-btn" onclick="showModal('favorites-modal')" title="Favorites">❤️</button>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="app-content" id="app-content">
</main>

    <!-- Bottom Tab Bar -->
    <nav class="tab-bar">
      <button class="tab-item active" data-view="dashboard">
        <span>🏠</span>
        <small>Home</small>
      </button>
      <button class="tab-item" data-view="timeline">
        <span>📅</span>
        <small>Timeline</small>
      </button>
      <button class="tab-item" data-view="map">
        <span>🗺️</span>
        <small>Map</small>
      </button>
      <button class="tab-item" data-view="expenses">
        <span>💰</span>
        <small>Expenses</small>
      </button>
      <button class="tab-item" data-view="profile">
        <span>👤</span>
        <small>Profile</small>
      </button>
    </nav>

    <!-- Modals will be injected here -->
    <div id="modals-container"></div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
