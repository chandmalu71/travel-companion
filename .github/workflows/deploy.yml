name: Deploy Neyya.ai

on:
  push:
    branches:
      - develop  # → Auto-deploy to QA
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - qa
          - production

env:
  NODE_VERSION: '20'

jobs:
  # ─── Build & Test ──────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @travel-companion/shared build
      - name: Typecheck
        run: pnpm --filter @travel-companion/api typecheck
      - name: Unit Tests
        run: pnpm --filter @travel-companion/api test && pnpm --filter @travel-companion/shared test
      - name: Build Web
        run: pnpm --filter @travel-companion/web build
        env:
          NEXT_PUBLIC_API_URL: ${{ github.ref == 'refs/heads/main' && 'https://api.neyya.ai' || 'https://api-qa.neyya.ai' }}
      - name: Build Admin
        run: pnpm --filter @travel-companion/admin build

  # ─── Determine Environment ─────────────────────────────────────────────
  determine-env:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      api_url: ${{ steps.set-env.outputs.api_url }}
      web_url: ${{ steps.set-env.outputs.web_url }}
      admin_url: ${{ steps.set-env.outputs.admin_url }}
    steps:
      - id: set-env
        run: |
          if [ "${{ github.event.inputs.environment }}" != "" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            ENV="qa"
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            ENV="production"
          else
            ENV="qa"
          fi
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          if [ "$ENV" == "production" ]; then
            echo "api_url=https://api.neyya.ai" >> $GITHUB_OUTPUT
            echo "web_url=https://neyya.ai" >> $GITHUB_OUTPUT
            echo "admin_url=https://admin.neyya.ai" >> $GITHUB_OUTPUT
          else
            echo "api_url=https://api-qa.neyya.ai" >> $GITHUB_OUTPUT
            echo "web_url=https://qa.neyya.ai" >> $GITHUB_OUTPUT
            echo "admin_url=https://admin-qa.neyya.ai" >> $GITHUB_OUTPUT
          fi

  # ─── Deploy to QA (automatic) ──────────────────────────────────────────
  deploy-qa:
    name: Deploy to QA
    runs-on: ubuntu-latest
    needs: [test, determine-env]
    if: needs.determine-env.outputs.environment == 'qa'
    environment:
      name: qa
      url: ${{ needs.determine-env.outputs.web_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @travel-companion/shared build

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Deploy API to Vercel (QA)
        run: |
          cd packages/api
          vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }} \
            --env DATABASE_URL=${{ secrets.QA_DATABASE_URL }} \
            --env REDIS_URL=${{ secrets.QA_REDIS_URL }} \
            --env JWT_SECRET=${{ secrets.QA_JWT_SECRET }} \
            --env GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
            --env GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} \
            --env STRIPE_SECRET_KEY=${{ secrets.QA_STRIPE_SECRET_KEY }} \
            --env EMAIL_PROVIDER=ses \
            --env SES_REGION=eu-west-1 \
            --env APP_URL=https://qa.neyya.ai \
            --env API_URL=https://api-qa.neyya.ai
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}

      - name: Deploy Web to Vercel (QA)
        run: |
          cd packages/web
          vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}
          NEXT_PUBLIC_API_URL: https://api-qa.neyya.ai

      - name: Deploy Admin to Vercel (QA)
        run: |
          cd packages/admin
          vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}

      - name: Health Check
        run: |
          sleep 10
          curl -f https://api-qa.neyya.ai/api/health || echo "Health check pending..."

  # ─── Deploy to Production (manual approval gate) ────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, determine-env]
    if: needs.determine-env.outputs.environment == 'production'
    environment:
      name: production
      url: https://neyya.ai
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @travel-companion/shared build

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Deploy API to Vercel (Production)
        run: |
          cd packages/api
          vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }} \
            --env DATABASE_URL=${{ secrets.PROD_DATABASE_URL }} \
            --env REDIS_URL=${{ secrets.PROD_REDIS_URL }} \
            --env JWT_SECRET=${{ secrets.PROD_JWT_SECRET }} \
            --env GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
            --env GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} \
            --env STRIPE_SECRET_KEY=${{ secrets.PROD_STRIPE_SECRET_KEY }} \
            --env EMAIL_PROVIDER=ses \
            --env SES_REGION=eu-west-1 \
            --env APP_URL=https://neyya.ai \
            --env API_URL=https://api.neyya.ai
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}

      - name: Deploy Web to Vercel (Production)
        run: |
          cd packages/web
          vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}
          NEXT_PUBLIC_API_URL: https://api.neyya.ai

      - name: Deploy Admin to Vercel (Production)
        run: |
          cd packages/admin
          vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}

      - name: Health Check
        run: |
          sleep 10
          curl -f https://api.neyya.ai/api/health || echo "Health check pending..."

      - name: Notify Deployment
        run: |
          echo "🚀 Production deployment complete!"
          echo "Web: https://neyya.ai"
          echo "Admin: https://admin.neyya.ai"
          echo "API: https://api.neyya.ai"
