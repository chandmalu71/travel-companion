name: Deploy Nayya.ai

on:
  push:
    branches:
      - develop    # → QA
      - 'release/*'  # → Staging
      - main       # → Production (manual approval)
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - qa
          - staging
          - production

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: nayya-api
  ECS_CLUSTER_PREFIX: nayya
  NODE_VERSION: '20'

jobs:
  # ─── Test ──────────────────────────────────────────────────────────────
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @travel-companion/shared build && pnpm --filter @travel-companion/api typecheck

      - name: Unit & Property Tests
        run: pnpm --filter @travel-companion/api test && pnpm --filter @travel-companion/shared test

      - name: Build Web App
        run: pnpm --filter @travel-companion/web build
        env:
          NEXT_PUBLIC_API_URL: https://api-${{ github.ref == 'refs/heads/main' && '' || github.ref == 'refs/heads/develop' && 'qa.' || 'staging.' }}nayya.ai

  # ─── Determine Environment ─────────────────────────────────────────────
  determine-env:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      api_domain: ${{ steps.set-env.outputs.api_domain }}
      web_domain: ${{ steps.set-env.outputs.web_domain }}
    steps:
      - id: set-env
        run: |
          if [ "${{ github.event.inputs.environment }}" != "" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            ENV="qa"
          elif [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            ENV="staging"
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            ENV="production"
          else
            ENV="qa"
          fi

          echo "environment=$ENV" >> $GITHUB_OUTPUT

          if [ "$ENV" == "production" ]; then
            echo "api_domain=api.nayya.ai" >> $GITHUB_OUTPUT
            echo "web_domain=nayya.ai" >> $GITHUB_OUTPUT
          elif [ "$ENV" == "staging" ]; then
            echo "api_domain=api-staging.nayya.ai" >> $GITHUB_OUTPUT
            echo "web_domain=staging.nayya.ai" >> $GITHUB_OUTPUT
          else
            echo "api_domain=api-qa.nayya.ai" >> $GITHUB_OUTPUT
            echo "web_domain=qa.nayya.ai" >> $GITHUB_OUTPUT
          fi

  # ─── Deploy API ────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API (${{ needs.determine-env.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [test, determine-env]
    environment: ${{ needs.determine-env.outputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          ENV: ${{ needs.determine-env.outputs.environment }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$ENV-latest \
            -f packages/api/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$ENV-latest

      - name: Deploy to ECS
        env:
          ENV: ${{ needs.determine-env.outputs.environment }}
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER_PREFIX }}-$ENV \
            --service nayya-api-$ENV \
            --force-new-deployment

      - name: Wait for Deployment
        env:
          ENV: ${{ needs.determine-env.outputs.environment }}
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER_PREFIX }}-$ENV \
            --services nayya-api-$ENV

  # ─── Deploy Web ────────────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web (${{ needs.determine-env.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [test, determine-env]
    environment: ${{ needs.determine-env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build Web App
        run: pnpm --filter @travel-companion/shared build && pnpm --filter @travel-companion/web build
        env:
          NEXT_PUBLIC_API_URL: https://${{ needs.determine-env.outputs.api_domain }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        env:
          ENV: ${{ needs.determine-env.outputs.environment }}
        run: |
          aws s3 sync packages/web/.next/static s3://nayya-web-$ENV/_next/static --delete
          aws s3 sync packages/web/public s3://nayya-web-$ENV/public --delete

      - name: Invalidate CloudFront
        env:
          ENV: ${{ needs.determine-env.outputs.environment }}
        run: |
          DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Comment=='nayya-$ENV'].Id" --output text)
          if [ -n "$DIST_ID" ]; then
            aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"
          fi

  # ─── E2E Tests (QA only) ───────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web, determine-env]
    if: needs.determine-env.outputs.environment == 'qa'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright
        run: cd packages/web && npx playwright install chromium

      - name: Run E2E Tests
        run: cd packages/web && npx playwright test
        env:
          BASE_URL: https://${{ needs.determine-env.outputs.web_domain }}
          API_URL: https://${{ needs.determine-env.outputs.api_domain }}
