name: Deploy to AWS (Docker/ECS)

on:
  push:
    branches:
      - develop  # → Auto-deploy to QA
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - qa
          - production

env:
  AWS_REGION: eu-west-1
  NODE_VERSION: '20'

permissions:
  contents: read

jobs:
  # ─── Build & Test ──────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @travel-companion/shared build
      - name: Typecheck
        run: pnpm --filter @travel-companion/api typecheck || true
      - name: Unit Tests
        run: pnpm --filter @travel-companion/shared test

  # ─── Determine Environment ─────────────────────────────────────────────
  determine-env:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      api_domain: ${{ steps.set-env.outputs.api_domain }}
      web_domain: ${{ steps.set-env.outputs.web_domain }}
      admin_domain: ${{ steps.set-env.outputs.admin_domain }}
      cluster_name: ${{ steps.set-env.outputs.cluster_name }}
    steps:
      - id: set-env
        run: |
          if [ "${{ github.event.inputs.environment }}" != "" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            ENV="qa"
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            ENV="production"
          else
            ENV="qa"
          fi
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "cluster_name=neyya-$ENV" >> $GITHUB_OUTPUT
          if [ "$ENV" == "production" ]; then
            echo "api_domain=https://api.neyya.ai" >> $GITHUB_OUTPUT
            echo "web_domain=https://neyya.ai" >> $GITHUB_OUTPUT
            echo "admin_domain=https://admin.neyya.ai" >> $GITHUB_OUTPUT
          else
            echo "api_domain=https://api-qa.neyya.ai" >> $GITHUB_OUTPUT
            echo "web_domain=https://qa.neyya.ai" >> $GITHUB_OUTPUT
            echo "admin_domain=https://admin-qa.neyya.ai" >> $GITHUB_OUTPUT
          fi

  # ─── Build & Push Docker Images ────────────────────────────────────────
  build-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test, determine-env]
    environment:
      name: ${{ needs.determine-env.outputs.environment }}
    strategy:
      matrix:
        service: [api, web, admin]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: image-tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          ENV=${{ needs.determine-env.outputs.environment }}
          echo "tag=${ENV}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "latest_tag=${ENV}-latest" >> $GITHUB_OUTPUT

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/neyya-${{ matrix.service }}:${{ steps.image-tag.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/neyya-${{ matrix.service }}:${{ steps.image-tag.outputs.latest_tag }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ needs.determine-env.outputs.api_domain }}
          cache-from: type=registry,ref=${{ steps.ecr-login.outputs.registry }}/neyya-${{ matrix.service }}:${{ steps.image-tag.outputs.latest_tag }}
          cache-to: type=inline

  # ─── Deploy to ECS ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build-images, determine-env]
    environment:
      name: ${{ needs.determine-env.outputs.environment }}
      url: ${{ needs.determine-env.outputs.web_domain }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: image-tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          ENV=${{ needs.determine-env.outputs.environment }}
          echo "tag=${ENV}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Update API service
        run: |
          CLUSTER=${{ needs.determine-env.outputs.cluster_name }}
          IMAGE="${{ steps.ecr-login.outputs.registry }}/neyya-api:${{ steps.image-tag.outputs.tag }}"
          # Get current task definition and update image
          TASK_DEF=$(aws ecs describe-task-definition --task-definition neyya-api-${{ needs.determine-env.outputs.environment }} --query taskDefinition)
          NEW_TASK_DEF=$(echo $TASK_DEF | jq --arg IMAGE "$IMAGE" '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')
          NEW_TASK_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service --cluster $CLUSTER --service neyya-api-${{ needs.determine-env.outputs.environment }} --task-definition $NEW_TASK_ARN --force-new-deployment

      - name: Update Web service
        run: |
          CLUSTER=${{ needs.determine-env.outputs.cluster_name }}
          IMAGE="${{ steps.ecr-login.outputs.registry }}/neyya-web:${{ steps.image-tag.outputs.tag }}"
          TASK_DEF=$(aws ecs describe-task-definition --task-definition neyya-web-${{ needs.determine-env.outputs.environment }} --query taskDefinition)
          NEW_TASK_DEF=$(echo $TASK_DEF | jq --arg IMAGE "$IMAGE" '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')
          NEW_TASK_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service --cluster $CLUSTER --service neyya-web-${{ needs.determine-env.outputs.environment }} --task-definition $NEW_TASK_ARN --force-new-deployment

      - name: Update Admin service
        run: |
          CLUSTER=${{ needs.determine-env.outputs.cluster_name }}
          IMAGE="${{ steps.ecr-login.outputs.registry }}/neyya-admin:${{ steps.image-tag.outputs.tag }}"
          TASK_DEF=$(aws ecs describe-task-definition --task-definition neyya-admin-${{ needs.determine-env.outputs.environment }} --query taskDefinition)
          NEW_TASK_DEF=$(echo $TASK_DEF | jq --arg IMAGE "$IMAGE" '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')
          NEW_TASK_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service --cluster $CLUSTER --service neyya-admin-${{ needs.determine-env.outputs.environment }} --task-definition $NEW_TASK_ARN --force-new-deployment

      - name: Wait for services to stabilize
        run: |
          CLUSTER=${{ needs.determine-env.outputs.cluster_name }}
          ENV=${{ needs.determine-env.outputs.environment }}
          echo "Waiting for API service..."
          aws ecs wait services-stable --cluster $CLUSTER --services neyya-api-$ENV
          echo "Waiting for Web service..."
          aws ecs wait services-stable --cluster $CLUSTER --services neyya-web-$ENV
          echo "Waiting for Admin service..."
          aws ecs wait services-stable --cluster $CLUSTER --services neyya-admin-$ENV

      - name: Health Check
        run: |
          sleep 10
          API_URL="${{ needs.determine-env.outputs.api_domain }}"
          curl -f ${API_URL}/api/health || echo "::warning::Health check pending — service may still be starting"

      - name: Deployment Summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Web | ${{ needs.determine-env.outputs.web_domain }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Admin | ${{ needs.determine-env.outputs.admin_domain }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API | ${{ needs.determine-env.outputs.api_domain }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ needs.determine-env.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag:** ${{ steps.image-tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
